<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="t1 d1">
  <title id="t1">Class distribution - retained vs churned</title>
  <desc id="d1">Horizontal bars showing roughly 80 percent retained and 20 percent churned in the Kaggle bank churn sample.</desc>
  <rect width="640" height="200" fill="#0c0a09"/>
  <text x="32" y="44" fill="#e7e5e4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" font-weight="600">Target distribution (n = 10,000)</text>
  <text x="32" y="72" fill="#a8a29e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">Share of customers who exited the bank in the observation window</text>
  <rect x="32" y="96" width="454" height="36" rx="6" fill="#292524" stroke="#44403c"/>
  <rect x="32" y="96" width="454" height="36" rx="6" fill="#10b981" opacity="0.35"/>
  <text x="48" y="120" fill="#fafaf9" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" font-weight="600">Retained (exited = 0)</text>
  <text x="470" y="120" fill="#d6d3d1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12">~79.6%</text>
  <rect x="32" y="144" width="116" height="36" rx="6" fill="#292524" stroke="#44403c"/>
  <rect x="32" y="144" width="116" height="36" rx="6" fill="#ef4444" opacity="0.45"/>
  <text x="48" y="168" fill="#fafaf9" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" font-weight="600">Churned (exited = 1)</text>
  <text x="156" y="168" fill="#d6d3d1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12">~20.4%</text>
</svg>
