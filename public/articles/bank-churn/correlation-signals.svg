<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-labelledby="t2 d2">
  <title id="t2">Pearson correlation with churn (exited)</title>
  <desc id="d2">Bar chart of selected feature correlations with the exited label from the exploratory analysis.</desc>
  <rect width="640" height="260" fill="#0c0a09"/>
  <text x="32" y="40" fill="#e7e5e4" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" font-weight="600">Signals vs. churn (Pearson r with exited)</text>
  <text x="32" y="64" fill="#a8a29e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">Strong linear drivers are rare; age and balance dominate weak correlations.</text>
  <line x1="320" y1="88" x2="320" y2="232" stroke="#44403c" stroke-width="1"/>
  <text x="312" y="84" text-anchor="end" fill="#78716c" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">0</text>
  <!-- negative bars left -->
  <text x="300" y="118" text-anchor="end" fill="#a8a29e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">is_active_member</text>
  <rect x="200" y="102" width="120" height="20" rx="4" fill="#38bdf8" opacity="0.85"/>
  <text x="188" y="117" text-anchor="end" fill="#d6d3d1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">-0.16</text>
  <text x="300" y="158" text-anchor="end" fill="#a8a29e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">credit_score</text>
  <rect x="268" y="142" width="52" height="20" rx="4" fill="#38bdf8" opacity="0.55"/>
  <text x="256" y="157" text-anchor="end" fill="#d6d3d1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">-0.03</text>
  <!-- positive bars right -->
  <text x="340" y="118" fill="#a8a29e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">balance</text>
  <rect x="320" y="102" width="56" height="20" rx="4" fill="#f97316" opacity="0.85"/>
  <text x="386" y="117" fill="#d6d3d1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">+0.12</text>
  <text x="340" y="158" fill="#a8a29e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">age</text>
  <rect x="320" y="142" width="134" height="20" rx="4" fill="#f97316" opacity="0.95"/>
  <text x="462" y="157" fill="#d6d3d1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">+0.29</text>
  <text x="340" y="198" fill="#a8a29e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">num_of_products</text>
  <rect x="248" y="182" width="72" height="20" rx="4" fill="#38bdf8" opacity="0.7"/>
  <text x="236" y="197" text-anchor="end" fill="#d6d3d1" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">-0.05</text>
  <text x="32" y="248" fill="#57534e" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">Values rounded for display; see notebook for full matrix.</text>
</svg>
