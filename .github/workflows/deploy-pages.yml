# Publishes the Vite `dist/` folder to GitHub Pages.
# Repo settings: Settings → Pages → Build and deployment → Source: GitHub Actions.
# After the first successful run, the site URL appears in the workflow summary and in Pages settings.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set Vite base and public site URL for GitHub Pages
        run: |
          OWNER='${{ github.repository_owner }}'
          REPO='${{ github.event.repository.name }}'
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
            # User Pages at apex: add public/CNAME + Settings → Pages custom domain → valentinatihova.com
            echo "VITE_SITE_URL=https://${OWNER}.com" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE=/${REPO}/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_ENV"
          fi

      - run: npm ci
      - run: npm run build

      - name: SPA fallback (GitHub Pages has no Netlify-style rewrites)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
